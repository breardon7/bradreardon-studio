<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brad Reardon · Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #999999;
      --dim: #cccccc;
      --border: #e5e5e5;
      --card: #f5f5f5;
      --danger: #c0392b;
    }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .wordmark {
      font-family: 'Libre Baskerville', serif;
      font-size: 17px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .header-tag {
      font-size: 12px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      padding: 0 32px;
    }

    .tab {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 0;
      margin-right: 32px;
      border-bottom: 1px solid transparent;
      border-top: none; border-left: none; border-right: none;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    .page { display: none; flex: 1; overflow: hidden; }
    .page.active { display: flex; }

    .divider { background: var(--border); width: 1px; flex-shrink: 0; }

    /* shared field styles */
    .section-label {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .field input, .field select {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 15px;
      color: var(--text);
      padding: 6px 0;
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--text); }
    .field input::placeholder { color: var(--dim); }
    .field select option { background: #fff; color: var(--text); }

    .checks { display: flex; gap: 20px; margin-bottom: 24px; }
    .check-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .check-item input[type="checkbox"] { display: none; }
    .check-box {
      width: 14px; height: 14px;
      border: 1px solid var(--border);
      transition: all 0.15s;
      flex-shrink: 0; position: relative;
    }
    .check-item input:checked + .check-box { background: var(--text); border-color: var(--text); }
    .check-item input:checked + .check-box::after {
      content: '';
      position: absolute;
      left: 3px; top: 1px;
      width: 5px; height: 8px;
      border: 1.5px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .check-label { font-size: 12px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }

    .rule { height: 1px; background: var(--border); margin: 4px 0 20px; }

    .submit-row { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
    .submit-btn {
      display: flex; align-items: center; gap: 14px;
      background: none; border: none; cursor: pointer;
      font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 300;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--muted); padding: 0;
      transition: color 0.2s;
    }
    .submit-btn:hover { color: var(--text); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .submit-btn .line { display: block; height: 1px; width: 32px; background: currentColor; }

    /* ADD PHOTO */
    .add-layout {
      display: grid;
      grid-template-columns: 1fr 1px 380px;
      flex: 1; overflow: hidden; width: 100%;
    }

    .drop-zone {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; background: var(--card);
      cursor: pointer; transition: background 0.15s;
      position: relative; overflow: hidden;
    }
    .drop-zone.dragover { background: #efefef; }
    .drop-zone.has-image { background: #fff; }
    .drop-zone img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }

    .drop-label {
      font-size: 12px; letter-spacing: .22em; text-transform: uppercase;
      color: var(--muted); text-align: center; line-height: 2;
      pointer-events: none; position: relative; z-index: 1;
    }
    .drop-label strong {
      display: block;
      font-family: 'Libre Baskerville', serif; font-size: 20px;
      font-weight: normal; letter-spacing: 0; text-transform: none;
      color: var(--text); margin-bottom: 6px;
    }
    .drop-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 2; opacity: 0; transition: opacity 0.15s; pointer-events: none;
    }
    .has-image .drop-overlay { opacity: 1; pointer-events: auto; }
    .change-btn {
      font-size: 12px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--text); background: #fff; border: 1px solid var(--text);
      padding: 14px 28px; cursor: pointer; transition: all 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .form-panel { display: flex; flex-direction: column; overflow-y: auto; padding: 28px 28px 24px; }
    .slug-preview { font-size: 12px; color: var(--dim); margin-top: 4px; letter-spacing: .04em; }

    /* PHOTOS tab */
    .photos-layout {
      display: grid;
      grid-template-columns: 260px 1px 1fr;
      flex: 1; overflow: hidden;
    }

    .photos-list-panel { display: flex; flex-direction: column; overflow: hidden; }

    .photos-filter-bar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .photos-filter-bar select {
      font-family: 'Jost', sans-serif; font-weight: 300;
      font-size: 12px; letter-spacing: .1em;
      color: var(--text); background: transparent;
      border: none; border-bottom: 1px solid var(--border);
      outline: none; flex: 1; padding: 4px 0;
      appearance: none; cursor: pointer;
    }

    .view-toggle { display: flex; gap: 8px; flex-shrink: 0; }
    .view-btn {
      font-family: 'Jost', sans-serif;
      font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--muted); background: none; border: none; border-bottom: 1px solid transparent;
      cursor: pointer; padding: 2px 0;
      transition: color 0.15s;
    }
    .view-btn:hover { color: var(--text); }
    .view-btn.active { color: var(--text); border-bottom-color: var(--text); }

    .photos-list { flex: 1; overflow-y: auto; }

    .photo-list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .photo-list-item:hover { background: var(--card); }
    .photo-list-item.selected { background: var(--card); }

    .photo-thumb { width: 36px; height: 36px; object-fit: cover; flex-shrink: 0; background: var(--border); }
    .photo-list-info { flex: 1; min-width: 0; }
    .photo-list-title { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .photo-list-meta { font-size: 11px; color: var(--muted); letter-spacing: .06em; margin-top: 2px; }
    .photo-list-badges { display: flex; gap: 4px; flex-shrink: 0; }
    .badge { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; padding: 2px 5px; border: 1px solid var(--border); color: var(--muted); }
    .badge.active { border-color: var(--text); color: var(--text); }

    /* edit panel */
    .photos-edit-panel { display: flex; flex-direction: column; overflow-y: auto; padding: 28px 28px 24px; flex: 1; }
    .edit-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--dim); font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
    }
    .edit-thumb-wrap { width: 100%; max-width: 220px; margin-bottom: 24px; }
    .edit-thumb-wrap img { width: 100%; height: auto; display: block; }

    .delete-btn {
      font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 0;
      transition: color 0.15s; margin-left: auto;
    }
    .delete-btn:hover { color: var(--danger); }
    .delete-btn.confirming { color: var(--danger); }

    /* order view */
    .order-panel { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .order-header {
      padding: 16px 28px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .order-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .order-item {
      display: flex; align-items: center; gap: 14px;
      padding: 8px 28px; cursor: grab;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      user-select: none;
    }
    .order-item:active { cursor: grabbing; }
    .order-item.drag-over { background: var(--card); }
    .order-item.dragging { opacity: 0.4; }
    .order-num { font-size: 11px; color: var(--dim); letter-spacing: .1em; width: 20px; flex-shrink: 0; text-align: right; }
    .order-thumb { width: 40px; height: 40px; object-fit: cover; flex-shrink: 0; background: var(--border); }
    .order-info { flex: 1; min-width: 0; }
    .order-title { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .order-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .drag-handle { color: var(--dim); font-size: 14px; flex-shrink: 0; line-height: 1; }

    /* SERIES tab */
    .series-page { flex: 1; overflow-y: auto; padding: 32px; max-width: 560px; }
    .series-list { margin-bottom: 40px; }
    .series-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .series-row:first-child { border-top: 1px solid var(--border); }
    .series-name { font-size: 15px; font-weight: 300; color: var(--text); flex: 1; }
    .series-name-input {
      font-family: 'Jost', sans-serif; font-weight: 300; font-size: 15px;
      color: var(--text); background: transparent; border: none;
      border-bottom: 1px solid var(--text); outline: none; width: 200px; padding: 2px 0;
    }
    .series-actions { display: flex; gap: 20px; align-items: center; }
    .action-btn {
      font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 0; transition: color 0.15s;
    }
    .action-btn:hover { color: var(--text); }
    .action-btn.danger:hover { color: var(--danger); }
    .action-btn.danger-confirm { color: var(--danger); }
    .action-btn.confirm { color: var(--text); }
    .add-series-row { display: flex; align-items: center; gap: 16px; }
    .add-series-input {
      font-family: 'Jost', sans-serif; font-weight: 300; font-size: 15px;
      color: var(--text); background: transparent; border: none;
      border-bottom: 1px solid var(--border); outline: none;
      padding: 6px 0; width: 240px; transition: border-color 0.15s;
    }
    .add-series-input:focus { border-bottom-color: var(--text); }
    .add-series-input::placeholder { color: var(--dim); }

    /* FEATURED tab */
    .featured-page { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .featured-header {
      padding: 20px 32px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .featured-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .featured-item {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 32px; cursor: grab;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      user-select: none;
    }
    .featured-item:active { cursor: grabbing; }
    .featured-item.drag-over { background: var(--card); }
    .featured-item.dragging { opacity: 0.4; }
    .featured-num { font-size: 11px; color: var(--dim); letter-spacing: .1em; width: 20px; flex-shrink: 0; text-align: right; }
    .featured-thumb { width: 56px; height: 56px; object-fit: cover; flex-shrink: 0; background: var(--border); }
    .featured-info { flex: 1; min-width: 0; }
    .featured-title { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .featured-meta { font-size: 11px; color: var(--muted); letter-spacing: .06em; margin-top: 3px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--text); color: #fff;
      font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
      padding: 10px 20px; opacity: 0; transition: all 0.25s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); }
  </style>
</head>
<body>

<header>
  <span class="wordmark">Brad Reardon</span>
  <span class="header-tag">Studio</span>
</header>

<div class="tabs">
  <button class="tab active" data-tab="add-photo">Add Photo</button>
  <button class="tab" data-tab="photos">Photos</button>
  <button class="tab" data-tab="series">Series</button>
  <button class="tab" data-tab="featured">Featured</button>
  <button class="tab" data-tab="shop">Shop</button>
</div>

<!-- ADD PHOTO -->
<div class="page active" id="page-add-photo">
  <div class="add-layout">
    <div class="drop-zone" id="dropZone">
      <div class="drop-label">
        <strong>Drop image here</strong>
        or click to browse
      </div>
      <div class="drop-overlay">
        <button class="change-btn" id="changeBtn">Change image</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="form-panel">
      <p class="section-label">Photo metadata</p>
      <div class="field">
        <label>Series</label>
        <select id="series"><option value="">Loading...</option></select>
      </div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="title" placeholder="Broadway Facade" />
      </div>
      <div class="field">
        <label>Slug (auto-generated)</label>
        <input type="text" id="slug" placeholder="broadway-facade-2024" />
        <p class="slug-preview" id="slugPreview"></p>
      </div>
      <div class="field">
        <label>Alt text</label>
        <input type="text" id="alt" placeholder="Black and white photo of Broadway facade" />
      </div>
      <div class="field">
        <label>Aspect ratio</label>
        <input type="text" id="aspectRatio" placeholder="2/3" />
        <p id="dimsNote" style="font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.06em;"></p>
      </div>
      <div class="field">
        <label>Year</label>
        <input type="number" id="year" placeholder="2024" value="2024" />
      </div>
      <p style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:20px;line-height:1.7;">Export spec: sRGB · 2400px long edge · JPG q85</p>
      <div class="rule"></div>
      <div class="checks">
        <label class="check-item">
          <input type="checkbox" id="cover" />
          <span class="check-box"></span>
          <span class="check-label">Cover</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="featured" />
          <span class="check-box"></span>
          <span class="check-label">Featured</span>
        </label>
      </div>
      <div class="submit-row">
        <button class="submit-btn" id="submitBtn" disabled>
          <span class="line"></span>
          Add photo
        </button>
      </div>
    </div>
  </div>
</div>

<!-- PHOTOS -->
<div class="page" id="page-photos">
  <div class="photos-layout">
    <div class="photos-list-panel">
      <div class="photos-filter-bar">
        <select id="photosSeriesFilter"><option value="">All series</option></select>
        <input id="photosSearch" type="text" placeholder="Search..." style="flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);font-family:Jost,sans-serif;font-weight:300;font-size:12px;color:var(--text);padding:4px 0;outline:none;max-width:120px;" />
        <div class="view-toggle">
          <button class="view-btn active" id="viewEditBtn">Edit</button>
          <button class="view-btn" id="viewOrderBtn">Order</button>
        </div>
      </div>
      <div class="photos-list" id="photosList"></div>
    </div>
    <div class="divider"></div>
    <div id="photosRight" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <!-- edit view -->
      <div id="editView" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;">
        <div class="photos-edit-panel" id="photosEditPanel">
          <div class="edit-empty">Select a photo to edit</div>
        </div>
      </div>
      <!-- order view -->
      <div id="orderView" style="flex:1;display:none;flex-direction:column;overflow:hidden;">
        <div class="order-panel">
          <div class="order-header">
            <span class="section-label" style="margin:0;" id="orderSeriesLabel">Select a series to reorder</span>
            <button class="submit-btn" id="saveOrderBtn" style="margin-top:0;">
              <span class="line"></span><span>Save order</span>
            </button>
          </div>
          <div class="order-list" id="orderList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SERIES -->
<div class="page" id="page-series">
  <div class="series-page">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;">
      <p class="section-label" style="margin:0;">Manage series</p>
      <button class="submit-btn" id="saveSeriesOrderBtn">
        <span class="line"></span><span>Save order</span>
      </button>
    </div>
    <div class="series-list" id="seriesList"></div>
    <div class="add-series-row">
      <input class="add-series-input" id="newSeriesInput" type="text" placeholder="New series name" />
      <button class="submit-btn" id="addSeriesBtn">
        <span class="line"></span>
        Add series
      </button>
    </div>
  </div>
</div>

<!-- FEATURED -->
<div class="page" id="page-featured">
  <div class="featured-page">
    <div class="featured-header">
      <span class="section-label" style="margin:0;">Homepage order — drag to reorder</span>
      <button class="submit-btn" id="saveFeaturedBtn">
        <span class="line"></span><span>Save order</span>
      </button>
    </div>
    <div class="featured-list" id="featuredList"></div>
  </div>
</div>


<!-- SHOP -->
<div class="page" id="page-shop">
  <div class="photos-layout">
    <div class="photos-list-panel">
      <div class="photos-filter-bar">
        <span class="section-label" style="margin:0;font-size:10px;flex:1;">Print listings</span>
        <div class="view-toggle">
          <button class="view-btn active" id="shopViewEditBtn">Edit</button>
          <button class="view-btn" id="shopViewOrderBtn">Order</button>
        </div>
      </div>
      <!-- browse list (edit mode) -->
      <div id="shopBrowseList" class="photos-list" style="flex:1;overflow-y:auto;"></div>
      <!-- drag list (order mode) -->
      <div id="shopDragPanel" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <div class="order-list" id="shopOrderList" style="flex:1;overflow-y:auto;padding:8px 0;"></div>
        <div style="padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;">
          <button class="submit-btn" id="saveShopOrderBtn">
            <span class="line"></span><span>Save order</span>
          </button>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div id="shopRight" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;">
        <div class="photos-edit-panel" id="shopEditInner">
          <div class="edit-empty">Select a print to edit</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none" />

<script>
// ── helpers ───────────────────────────────────────────────────────────────────
var toast = document.getElementById('toast');
var toastTimer = null;
function showToast(msg, isError) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toast.className = 'toast'; }, 3200);
}
function imgSrc(src) {
  return 'http://localhost:3001/photo-image?src=' + encodeURIComponent(src);
}

// ── Unsaved changes tracking ──────────────────────────────────────────────────
var hasUnsavedChanges = false;
function markDirty() { hasUnsavedChanges = true; }
function markClean() { hasUnsavedChanges = false; }

window.addEventListener('beforeunload', function(e) {
  if (hasUnsavedChanges) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── Tab routing ───────────────────────────────────────────────────────────────
var tabs = document.querySelectorAll('.tab');
var pages = document.querySelectorAll('.page');
tabs.forEach(function(tab) {
  tab.addEventListener('click', function() {

function loadSeriesDropdown() {
  return fetch('http://localhost:3001/api/series')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('series').innerHTML = data.series.map(function(s) {
        return '<option value="' + s + '">' + s + '</option>';
      }).join('');
      checkReady();
      var filterEl = document.getElementById('photosSeriesFilter');
      var prev = filterEl.value;
      filterEl.innerHTML = '<option value="">All series</option>' + data.series.map(function(s) {

// ══ ADD PHOTO ════════════════════════════════════════════════════════════════
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var submitBtn = document.getElementById('submitBtn');
var titleEl = document.getElementById('title');
var slugEl = document.getElementById('slug');
var slugPreview = document.getElementById('slugPreview');
var altEl = document.getElementById('alt');
var aspectEl = document.getElementById('aspectRatio');
var yearEl = document.getElementById('year');
var seriesEl = document.getElementById('series');
var uploadedFile = null;
var uploadedFileDims = null; // { width, height } from actual file

// Export spec reminder shown below aspect ratio field


function toSlug(str) {
  var year = yearEl.value || new Date().getFullYear();
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '-' + year;
}
titleEl.addEventListener('input', function() { if (titleEl.value) { var s = toSlug(titleEl.value); slugEl.value = s; slugPreview.textContent = s; } });
yearEl.addEventListener('input', function() { if (titleEl.value) { var s = toSlug(titleEl.value); slugEl.value = s; slugPreview.textContent = s; } });

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  uploadedFile = file;
  uploadedFileDims = null;
  var old = dropZone.querySelector('img'); if (old) old.remove();
  var img = document.createElement('img'); img.src = URL.createObjectURL(file);
  dropZone.appendChild(img); dropZone.classList.add('has-image');
  var sizer = new Image();
  sizer.onload = function() {
    var w = sizer.naturalWidth, h = sizer.naturalHeight, r = w / h;
    uploadedFileDims = { width: w, height: h };
    // Set aspect ratio — use exact pixel ratio, not snapped
    aspectEl.value = w + '/' + h;
    // Show actual dimensions next to field
    var dimsNote = document.getElementById('dimsNote');
    if (dimsNote) dimsNote.textContent = w + ' \u00d7 ' + h + 'px';
    checkReady();
  };
  sizer.src = URL.createObjectURL(file);
  checkReady();
}

dropZone.addEventListener('click', function() { if (!dropZone.classList.contains('has-image')) fileInput.click(); });
document.getElementById('changeBtn').addEventListener('click', function(e) { e.stopPropagation(); fileInput.click(); });
fileInput.addEventListener('change', function() { handleFile(fileInput.files[0]); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

function checkReady() {
  submitBtn.disabled = !(uploadedFile && titleEl.value && slugEl.value && seriesEl.value);
}
[titleEl, slugEl, altEl].forEach(function(el) { el.addEventListener('input', checkReady); });
seriesEl.addEventListener('change', checkReady);
seriesEl.addEventListener('input', checkReady);

submitBtn.addEventListener('click', async function() {
  var slugVal = slugEl.value;
  submitBtn.disabled = true;
  submitBtn.querySelector('span:last-child').textContent = 'Uploading...';
  try {
    var fd = new FormData(); fd.append('image', uploadedFile); fd.append('series', seriesEl.value);
    var up = await fetch('http://localhost:3001/api/upload', { method: 'POST', body: fd });
    var upData = await up.json();
    var pr = await fetch('http://localhost:3001/api/photos', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        slug: slugVal, src: upData.src, alt: altEl.value || titleEl.value,
        title: titleEl.value, series: seriesEl.value, aspectRatio: aspectEl.value || '2/3',
        year: parseInt(yearEl.value) || new Date().getFullYear(),
        cover: document.getElementById('cover').checked,
        featured: document.getElementById('featured').checked,
      }),
    });
    var prData = await pr.json();
    if (!pr.ok) throw new Error(prData.error || 'Failed to write photo');
    showToast('Photo added', false); loadSeriesDropdown(); resetForm();
  } catch(e) {
    showToast('Error: ' + e.message, true);
    submitBtn.disabled = false;
    submitBtn.querySelector('span:last-child').textContent = 'Add photo';
  }
});

function resetForm() {
  uploadedFile = null; uploadedFileDims = null;
  var img = dropZone.querySelector('img'); if (img) img.remove();
  dropZone.classList.remove('has-image');
  titleEl.value = ''; slugEl.value = ''; slugPreview.textContent = '';
  altEl.value = ''; aspectEl.value = '';
  var dimsNote = document.getElementById('dimsNote'); if (dimsNote) dimsNote.textContent = '';
  yearEl.value = new Date().getFullYear();
  document.getElementById('cover').checked = false;
  document.getElementById('featured').checked = false;
  submitBtn.querySelector('span:last-child').textContent = 'Add photo';
  checkReady();
}

// ══ PHOTOS tab ════════════════════════════════════════════════════════════════
var photosList = document.getElementById('photosList');
var photosEditPanel = document.getElementById('photosEditPanel');
var photosSeriesFilter = document.getElementById('photosSeriesFilter');
var editView = document.getElementById('editView');
var orderView = document.getElementById('orderView');
var allPhotos = [];
var selectedSlug = null;
var currentView = 'edit';
var searchInput = document.getElementById('photosSearch');

document.getElementById('viewEditBtn').addEventListener('click', function() {
  currentView = 'edit';
  document.getElementById('viewEditBtn').classList.add('active');
  document.getElementById('viewOrderBtn').classList.remove('active');
  editView.style.display = 'flex'; orderView.style.display = 'none';
});
document.getElementById('viewOrderBtn').addEventListener('click', function() {
  currentView = 'order';
  document.getElementById('viewOrderBtn').classList.add('active');

photosSeriesFilter.addEventListener('change', function() {
  renderPhotosList();

});
if (searchInput) searchInput.addEventListener('input', renderPhotosList);

function loadPhotosList() {
  fetch('http://localhost:3001/api/photos')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allPhotos = data.photos;
      // Update series count badges
      updateSeriesCounts(data.photos);
      renderPhotosList();
    });
}

function updateSeriesCounts(photos) {
  var counts = {};
  photos.forEach(function(p) { counts[p.series] = (counts[p.series] || 0) + 1; });
  window._seriesCounts = counts;
}

function renderPhotosList() {
  var filter = photosSeriesFilter.value;
  var search = searchInput ? searchInput.value.toLowerCase().trim() : '';
  var filtered = allPhotos.filter(function(p) {
    var matchSeries = !filter || p.series === filter;
    var matchSearch = !search || (p.title || '').toLowerCase().includes(search) || p.slug.toLowerCase().includes(search);
    return matchSeries && matchSearch;
  });

  photosList.innerHTML = '';
  if (!filtered.length) {
    var empty = document.createElement('div');
    empty.style.cssText = 'padding:24px 20px;font-size:12px;color:#ccc;letter-spacing:.1em;text-transform:uppercase;';
    empty.textContent = search ? 'No results' : 'No photos';
    photosList.appendChild(empty); return;
  }
  filtered.forEach(function(photo) {
    var item = document.createElement('div');
    item.className = 'photo-list-item' + (photo.slug === selectedSlug ? ' selected' : '');
    if (photo.hidden) item.style.opacity = '0.5';
    item.dataset.slug = photo.slug;
    var thumb = document.createElement('img'); thumb.className = 'photo-thumb';
    thumb.src = imgSrc(photo.src); thumb.onerror = function() { thumb.style.background = '#eee'; };
    var info = document.createElement('div'); info.className = 'photo-list-info';
    var t = document.createElement('div'); t.className = 'photo-list-title'; t.textContent = photo.title || photo.slug;
    var m = document.createElement('div'); m.className = 'photo-list-meta'; m.textContent = photo.series + ' \u00b7 ' + (photo.year || '');
    info.appendChild(t); info.appendChild(m);
    var badges = document.createElement('div'); badges.className = 'photo-list-badges';
    if (photo.cover) { var b = document.createElement('span'); b.className = 'badge active'; b.textContent = 'C'; badges.appendChild(b); }
    if (photo.featured) { var b2 = document.createElement('span'); b2.className = 'badge active'; b2.textContent = 'F'; badges.appendChild(b2); }
    if (photo.hidden) { var b3 = document.createElement('span'); b3.className = 'badge'; b3.textContent = 'H'; b3.style.color = 'var(--muted)'; badges.appendChild(b3); }
    if (photo.print) { var b4 = document.createElement('span'); b4.className = 'badge active'; b4.style.borderColor='#888'; b4.style.color='#888'; b4.textContent = 'P'; badges.appendChild(b4); }
    item.appendChild(thumb); item.appendChild(info); item.appendChild(badges);
    item.addEventListener('click', function() { if (currentView === 'edit') openPhotoEdit(photo.slug); });
    photosList.appendChild(item);
  });
}

function openPhotoEdit(slug) {
  if (hasUnsavedChanges) {
    if (!confirm('You have unsaved changes. Discard them?')) return;
    markClean();
  }
  selectedSlug = slug;
  document.querySelectorAll('.photo-list-item').forEach(function(el) {
    el.classList.toggle('selected', el.dataset.slug === slug);
  });
  var photo = allPhotos.find(function(p) { return p.slug === slug; });
  if (!photo) return;
  fetch('http://localhost:3001/api/series').then(function(r) { return r.json(); })
    .then(function(data) { renderEditPanel(photo, data.series); });
}

function renderEditPanel(photo, seriesList) {
  photosEditPanel.innerHTML = '';
  markClean();

  // thumbnail — click to open lightbox
  var thumbWrap = document.createElement('div'); thumbWrap.className = 'edit-thumb-wrap';
  thumbWrap.style.cursor = 'zoom-in';
  var thumb = document.createElement('img'); thumb.src = imgSrc(photo.src);
  thumb.onerror = function() { thumbWrap.style.display = 'none'; };
  thumbWrap.appendChild(thumb);
  thumbWrap.addEventListener('click', function() { openImageLightbox(imgSrc(photo.src), photo.title); });
  photosEditPanel.appendChild(thumbWrap);

  // image dimensions display
  var dimsEl = document.createElement('p');
  dimsEl.style.cssText = 'font-size:11px;color:var(--muted);letter-spacing:.08em;margin-bottom:20px;margin-top:-16px;';
  dimsEl.textContent = 'Loading dimensions...';
  photosEditPanel.appendChild(dimsEl);
  fetch('http://localhost:3001/api/image-dimensions?src=' + encodeURIComponent(photo.src))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.width) {
        var declared = photo.aspectRatio || '';
        dimsEl.textContent = d.width + ' \u00d7 ' + d.height + 'px — ratio ' + d.ratio;
        // warn if declared ratio looks off
        var parts = declared.split('/');
        if (parts.length === 2) {
          var declaredRatio = (parseFloat(parts[0]) / parseFloat(parts[1])).toFixed(4);
          if (Math.abs(parseFloat(d.ratio) - parseFloat(declaredRatio)) > 0.05) {
            dimsEl.textContent += ' \u26a0 declared ' + declared + ' may not match';
            dimsEl.style.color = '#c0392b';
          }
        }
      } else { dimsEl.textContent = ''; }
    })
    .catch(function() { dimsEl.textContent = ''; });

  // header row
  var topRow = document.createElement('div');
  topRow.style.cssText = 'display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;';
  var lbl = document.createElement('p'); lbl.className = 'section-label'; lbl.style.marginBottom = '0'; lbl.textContent = 'Edit photo';
  var deleteBtn = document.createElement('button'); deleteBtn.className = 'delete-btn'; deleteBtn.textContent = 'Delete';
  var deleteUndo = null; // for undo
  deleteBtn.addEventListener('click', function() {
    if (deleteBtn.dataset.confirm === 'true') {
      doDeletePhoto(photo.slug, photo.src);
    } else {
      deleteBtn.textContent = 'Sure? This is permanent';
      deleteBtn.dataset.confirm = 'true'; deleteBtn.classList.add('confirming');
      setTimeout(function() {
        if (deleteBtn.dataset.confirm === 'true') { deleteBtn.textContent = 'Delete'; deleteBtn.dataset.confirm = ''; deleteBtn.classList.remove('confirming'); }
      }, 4000);
    }
  });
  topRow.appendChild(lbl); topRow.appendChild(deleteBtn); photosEditPanel.appendChild(topRow);

  function makeField(labelText, value, type, options) {
    var wrap = document.createElement('div'); wrap.className = 'field';
    var l = document.createElement('label'); l.textContent = labelText; wrap.appendChild(l);
    var input;
    if (type === 'select') {
      input = document.createElement('select');
      options.forEach(function(opt) { var o = document.createElement('option'); o.value = opt; o.textContent = opt; if (opt === value) o.selected = true; input.appendChild(o); });
    } else {
      input = document.createElement('input'); input.type = type || 'text'; input.value = value || '';
    }
    input.addEventListener('input', markDirty);
    input.addEventListener('change', markDirty);
    wrap.appendChild(input); return { wrap: wrap, input: input };
  }

  var fTitle = makeField('Title', photo.title, 'text');
  var fAlt = makeField('Alt text', photo.alt, 'text');
  var fSeries = makeField('Series', photo.series, 'select', seriesList);
  var fRatio = makeField('Aspect ratio', photo.aspectRatio, 'text');
  var fYear = makeField('Year', photo.year, 'number');
  [fTitle, fAlt, fSeries, fRatio, fYear].forEach(function(f) { photosEditPanel.appendChild(f.wrap); });

  var rule = document.createElement('div'); rule.className = 'rule'; photosEditPanel.appendChild(rule);
  var checks = document.createElement('div'); checks.className = 'checks';

  function makeCheck(labelText, checked, field) {
    var lbl2 = document.createElement('label'); lbl2.className = 'check-item';
    var inp = document.createElement('input'); inp.type = 'checkbox'; inp.checked = checked;
    var box = document.createElement('span'); box.className = 'check-box';
    var txt = document.createElement('span'); txt.className = 'check-label'; txt.textContent = labelText;
    lbl2.appendChild(inp); lbl2.appendChild(box); lbl2.appendChild(txt);
    inp.addEventListener('change', async function() {
      try {
        var res = await fetch('http://localhost:3001/api/photos/' + encodeURIComponent(photo.slug), {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ field: field, value: inp.checked }),
        });
        var data = await res.json(); if (!res.ok) throw new Error(data.error);
        var p = allPhotos.find(function(x) { return x.slug === photo.slug; }); if (p) p[field] = inp.checked;
        if (field === 'print') {
          if (inp.checked) {
            await fetch('http://localhost:3001/api/prints/' + encodeURIComponent(photo.slug), {
              method: 'PUT', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ slug: photo.slug, visible: false, priceLine: '', medium: '', paper: '', finish: '', notes: '', sizes: [] }),
            });
          } else {
            await fetch('http://localhost:3001/api/prints/' + encodeURIComponent(photo.slug), { method: 'DELETE' });
          }
        }
        showToast(labelText + ' ' + (inp.checked ? 'on' : 'off'), false); renderPhotosList();
      } catch(e) { inp.checked = !inp.checked; showToast('Error: ' + e.message, true); }
    });
    return lbl2;
  }

  checks.appendChild(makeCheck('Cover', photo.cover, 'cover'));
  checks.appendChild(makeCheck('Featured', photo.featured, 'featured'));
  checks.appendChild(makeCheck('Hidden', photo.hidden, 'hidden'));
  checks.appendChild(makeCheck('Print', photo.print, 'print'));
  photosEditPanel.appendChild(checks);

  // bulk actions row
  var bulkRow = document.createElement('div');
  bulkRow.style.cssText = 'display:flex;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;';
  var bulkLabel = document.createElement('span');
  bulkLabel.style.cssText = 'font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);align-self:center;flex-shrink:0;';
  bulkLabel.textContent = 'Series:';

  function makeBulkBtn(label, action) {
    var btn = document.createElement('button'); btn.className = 'action-btn';
    btn.style.fontSize = '10px';
    btn.textContent = label;
    btn.addEventListener('click', async function() {
      var seriesName = photo.series;
      var seriesPhotos = allPhotos.filter(function(p) { return p.series === seriesName; });
      btn.textContent = 'Working...';
      for (var i = 0; i < seriesPhotos.length; i++) {
        var p = seriesPhotos[i];
        await fetch('http://localhost:3001/api/photos/' + encodeURIComponent(p.slug), {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(action),
        });
        var local = allPhotos.find(function(x) { return x.slug === p.slug; });
        if (local) local[action.field] = action.value;
      }
      showToast('Done \u2014 ' + seriesPhotos.length + ' photos updated', false);
      btn.textContent = label;
      renderPhotosList();
    });
    return btn;
  }

  bulkRow.appendChild(bulkLabel);
  bulkRow.appendChild(makeBulkBtn('Hide all', { field: 'hidden', value: true }));
  bulkRow.appendChild(makeBulkBtn('Show all', { field: 'hidden', value: false }));
  bulkRow.appendChild(makeBulkBtn('Feature all', { field: 'featured', value: true }));
  bulkRow.appendChild(makeBulkBtn('Unfeature all', { field: 'featured', value: false }));
  photosEditPanel.appendChild(bulkRow);

  var saveRow = document.createElement('div'); saveRow.className = 'submit-row';
  var saveBtn = document.createElement('button'); saveBtn.className = 'submit-btn';
  saveBtn.innerHTML = '<span class="line"></span><span>Save changes</span>';
  saveBtn.addEventListener('click', async function() {
    saveBtn.disabled = true; saveBtn.querySelector('span:last-child').textContent = 'Saving...';
    try {
      var res = await fetch('http://localhost:3001/api/photos/' + encodeURIComponent(photo.slug), {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: fTitle.input.value, alt: fAlt.input.value, series: fSeries.input.value, aspectRatio: fRatio.input.value, year: parseInt(fYear.input.value) }),
      });
      var data = await res.json(); if (!res.ok) throw new Error(data.error);
      var p = allPhotos.find(function(x) { return x.slug === photo.slug; });
      if (p) { p.title = fTitle.input.value; p.alt = fAlt.input.value; p.series = fSeries.input.value; p.aspectRatio = fRatio.input.value; p.year = parseInt(fYear.input.value); }
      markClean();
      showToast('Saved', false); renderPhotosList();
    } catch(e) { showToast('Error: ' + e.message, true); }
    saveBtn.disabled = false; saveBtn.querySelector('span:last-child').textContent = 'Save changes';
  });
  saveRow.appendChild(saveBtn); photosEditPanel.appendChild(saveRow);
}

async function doDeletePhoto(slug, src) {
  // Soft-delete: stash data for undo before calling API
  var photoData = allPhotos.find(function(p) { return p.slug === slug; });
  try {
    var res = await fetch('http://localhost:3001/api/photos/' + encodeURIComponent(slug), { method: 'DELETE' });
    var data = await res.json(); if (!res.ok) throw new Error(data.error);
    markClean();
    allPhotos = allPhotos.filter(function(p) { return p.slug !== slug; });
    selectedSlug = null;
    photosEditPanel.innerHTML = '<div class="edit-empty">Select a photo to edit</div>';
    renderPhotosList();
    showToast('Deleted — image file removed from disk', false);
  } catch(e) { showToast('Error: ' + e.message, true); }
}

// ── Image lightbox (for thumbnail click) ─────────────────────────────────────
function openImageLightbox(src, title) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
  var img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'max-width:90vw;max-height:90vh;object-fit:contain;display:block;';
  overlay.appendChild(img);
  if (title) {
    var cap = document.createElement('p');
    cap.style.cssText = 'position:absolute;bottom:24px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:.18em;text-transform:uppercase;';
    cap.textContent = title; overlay.appendChild(cap);
  }
  overlay.addEventListener('click', function() { document.body.removeChild(overlay); });
  document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape') { if (document.body.contains(overlay)) document.body.removeChild(overlay); document.removeEventListener('keydown', esc); } });
  document.body.appendChild(overlay);
}

// ── Order view ────────────────────────────────────────────────────────────────
var orderList = document.getElementById('orderList');
var orderSeriesLabel = document.getElementById('orderSeriesLabel');
var orderPhotos = [];
var orderDragSrc = null;

function renderOrderView() {
  var series = photosSeriesFilter.value;
  if (!series) {
    orderList.innerHTML = '<div style="padding:24px 28px;font-size:12px;color:#ccc;letter-spacing:.1em;text-transform:uppercase;">Select a series in the filter above</div>';
    orderSeriesLabel.textContent = 'Select a series to reorder';
    return;
  }
  orderSeriesLabel.textContent = series + ' \u2014 gallery order';
  fetch('http://localhost:3001/api/series-order/' + encodeURIComponent(series))
    .then(function(r) { return r.json(); })
    .then(function(data) { orderPhotos = data.photos; renderOrderList(); });
}

function renderOrderList() {
  orderList.innerHTML = '';
  orderPhotos.forEach(function(photo, idx) {
    var item = document.createElement('div');
    item.className = 'order-item'; item.draggable = true; item.dataset.slug = photo.slug;
    var num = document.createElement('span'); num.className = 'order-num'; num.textContent = idx + 1;
    var thumb = document.createElement('img'); thumb.className = 'order-thumb';
    thumb.src = imgSrc(photo.src); thumb.onerror = function() { thumb.style.background = '#eee'; };
    var info = document.createElement('div'); info.className = 'order-info';
    var t = document.createElement('div'); t.className = 'order-title'; t.textContent = photo.title || photo.slug;
    var m = document.createElement('div'); m.className = 'order-meta'; m.textContent = photo.year || '';
    if (photo.hidden) m.textContent += ' \u00b7 hidden';
    info.appendChild(t); info.appendChild(m);
    var handle = document.createElement('span'); handle.className = 'drag-handle'; handle.textContent = '\u2837';
    item.appendChild(num); item.appendChild(thumb); item.appendChild(info); item.appendChild(handle);
    item.addEventListener('dragstart', function(e) { orderDragSrc = item; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    item.addEventListener('dragend', function() { item.classList.remove('dragging'); document.querySelectorAll('.order-item').forEach(function(el) { el.classList.remove('drag-over'); }); });
    item.addEventListener('dragover', function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; document.querySelectorAll('.order-item').forEach(function(el) { el.classList.remove('drag-over'); }); if (item !== orderDragSrc) item.classList.add('drag-over'); });
    item.addEventListener('drop', function(e) {
      e.preventDefault(); if (!orderDragSrc || orderDragSrc === item) return;
      var fi = orderPhotos.findIndex(function(p) { return p.slug === orderDragSrc.dataset.slug; });
      var ti = orderPhotos.findIndex(function(p) { return p.slug === item.dataset.slug; });
      var moved = orderPhotos.splice(fi, 1)[0]; orderPhotos.splice(ti, 0, moved); renderOrderList();
    });
    orderList.appendChild(item);
  });
}

var seriesList = document.getElementById('seriesList');

document.getElementById('saveSeriesOrderBtn').addEventListener('click', async function() {

function makeSeriesRow(name, visible, count) {
  var row = document.createElement('div');
  row.className = 'series-row'; row.dataset.name = name; row.draggable = true;
  var nameEl = document.createElement('span'); nameEl.className = 'series-name'; nameEl.textContent = name;
  if (!visible) nameEl.style.color = 'var(--dim)';

  // photo count
  if (count !== undefined) {
    var countEl = document.createElement('span');
    countEl.style.cssText = 'font-size:11px;color:var(--dim);letter-spacing:.08em;margin-left:10px;';
    countEl.textContent = count + ' photo' + (count !== 1 ? 's' : '');
    nameEl.appendChild(countEl);
  }

  var actions = document.createElement('div'); actions.className = 'series-actions';
  var handle = document.createElement('span'); handle.className = 'series-drag-handle'; handle.textContent = '\u2837';

  actions.addEventListener('mousedown', function(e) { e.stopPropagation(); row.draggable = false; });
  actions.addEventListener('mouseup', function() { setTimeout(function() { row.draggable = true; }, 0); });

  row.addEventListener('dragstart', function(e) { seriesDragSrc = row; row.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
  row.addEventListener('dragend', function() { row.classList.remove('dragging'); document.querySelectorAll('.series-row').forEach(function(el) { el.classList.remove('drag-over'); }); });
  row.addEventListener('dragover', function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; document.querySelectorAll('.series-row').forEach(function(el) { el.classList.remove('drag-over'); }); if (row !== seriesDragSrc) row.classList.add('drag-over'); });
  row.addEventListener('drop', function(e) {
    e.preventDefault(); if (!seriesDragSrc || seriesDragSrc === row) return;
    var fi = seriesOrder.indexOf(seriesDragSrc.dataset.name);
    var ti = seriesOrder.indexOf(row.dataset.name);
    var moved = seriesOrder.splice(fi, 1)[0]; seriesOrder.splice(ti, 0, moved);
    loadSeriesListFromOrder();
  });

  var visBtn = document.createElement('button');
  visBtn.className = 'action-btn' + (!visible ? ' confirm' : '');
  visBtn.textContent = visible ? 'Visible' : 'Hidden';
  visBtn.addEventListener('click', async function() {
    var nowVisible = visBtn.textContent === 'Visible';
    var newVisible = !nowVisible;
    try {
      var res = await fetch('http://localhost:3001/api/series/visibility', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, visible: newVisible }),
      });
      var data = await res.json(); if (!res.ok) throw new Error(data.error);
      visBtn.textContent = newVisible ? 'Visible' : 'Hidden';
      visBtn.className = 'action-btn' + (!newVisible ? ' confirm' : '');
      nameEl.style.color = newVisible ? '' : 'var(--dim)';
      seriesConfigCache[name] = { visible: newVisible };
      showToast(name + ' ' + (newVisible ? 'visible' : 'hidden'), false);
    } catch(e) { showToast('Error: ' + e.message, true); }
  });

  var renameBtn = document.createElement('button'); renameBtn.className = 'action-btn'; renameBtn.textContent = 'Rename';
  var deleteBtn = document.createElement('button'); deleteBtn.className = 'action-btn danger'; deleteBtn.textContent = 'Delete';

  renameBtn.addEventListener('click', function() {
    if (row.classList.contains('renaming')) return;
    row.classList.add('renaming');
    var input = document.createElement('input'); input.className = 'series-name-input'; input.value = name;
    nameEl.replaceWith(input); input.focus(); input.select();
    renameBtn.textContent = 'Save'; renameBtn.classList.add('confirm');
    var cancelBtn = document.createElement('button'); cancelBtn.className = 'action-btn'; cancelBtn.textContent = 'Cancel';
    actions.insertBefore(cancelBtn, deleteBtn);
    cancelBtn.addEventListener('click', function() { input.replaceWith(nameEl); renameBtn.textContent = 'Rename'; renameBtn.classList.remove('confirm'); cancelBtn.remove(); row.classList.remove('renaming'); });
    renameBtn.addEventListener('click', async function() {
      var newName = input.value.trim();
      if (!newName || newName === name) { input.replaceWith(nameEl); renameBtn.textContent = 'Rename'; renameBtn.classList.remove('confirm'); cancelBtn.remove(); row.classList.remove('renaming'); return; }
      try {
        var res = await fetch('http://localhost:3001/api/series/rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ oldName: name, newName: newName }) });
        var data = await res.json(); if (!res.ok) throw new Error(data.error);
        showToast('Renamed to ' + newName, false); loadSeriesList(); loadSeriesDropdown();
      } catch(e) { showToast('Error: ' + e.message, true); }
    }, { once: true });
  });

  deleteBtn.addEventListener('click', async function() {
    if (deleteBtn.dataset.confirm === 'true') {
      try {
        var res = await fetch('http://localhost:3001/api/series/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name }) });
        var data = await res.json(); if (!res.ok) throw new Error(data.error);
        showToast(name + ' deleted', false); loadSeriesList(); loadSeriesDropdown();
      } catch(e) { showToast('Error: ' + e.message, true); deleteBtn.textContent = 'Delete'; deleteBtn.dataset.confirm = ''; deleteBtn.classList.remove('danger-confirm'); }
    } else {
      deleteBtn.textContent = 'Sure?'; deleteBtn.dataset.confirm = 'true'; deleteBtn.classList.add('danger-confirm');
      setTimeout(function() { deleteBtn.textContent = 'Delete'; deleteBtn.dataset.confirm = ''; deleteBtn.classList.remove('danger-confirm'); }, 3000);
    }
  });

  actions.appendChild(visBtn); actions.appendChild(renameBtn); actions.appendChild(deleteBtn);
  row.appendChild(handle); row.appendChild(nameEl); row.appendChild(actions);
  return row;
}

document.getElementById('addSeriesBtn').addEventListener('click', async function() {

var shopBrowseList = document.getElementById('shopBrowseList');
var shopDragPanel = document.getElementById('shopDragPanel');
var shopEditInner = document.getElementById('shopEditInner');
var allPrints = [];
var shopPhotoMap = {};
var selectedPrintSlug = null;
var currentShopView = 'edit';
var shopDragSrc = null;

document.getElementById('shopViewEditBtn').addEventListener('click', function() {
  currentShopView = 'edit';
  document.getElementById('shopViewEditBtn').classList.add('active');
  document.getElementById('shopViewOrderBtn').classList.remove('active');
  shopBrowseList.style.display = ''; shopDragPanel.style.display = 'none';
});
document.getElementById('shopViewOrderBtn').addEventListener('click', function() {
  currentShopView = 'order';
  document.getElementById('shopViewOrderBtn').classList.add('active');
  document.getElementById('shopViewEditBtn').classList.remove('active');
  shopBrowseList.style.display = 'none'; shopDragPanel.style.display = 'flex';

});

function loadShopList() {
  Promise.all([
    fetch('http://localhost:3001/api/prints').then(function(r) { return r.json(); }),
    fetch('http://localhost:3001/api/photos').then(function(r) { return r.json(); }),
  ]).then(function(results) {
    allPrints = results[0].prints || [];
    var photos = results[1].photos || [];
    shopPhotoMap = {};
    photos.forEach(function(p) { shopPhotoMap[p.slug] = p; });
    renderShopBrowseList();
    if (currentShopView === 'order') renderShopOrderList();
  });
}

function renderShopBrowseList() {
  shopBrowseList.innerHTML = '';
  if (!allPrints.length) {
    var empty = document.createElement('div');
    empty.style.cssText = 'padding:24px 20px;font-size:12px;color:#ccc;letter-spacing:.1em;text-transform:uppercase;';
    empty.textContent = 'No prints yet \u2014 toggle Print on a photo';
    shopBrowseList.appendChild(empty); return;
  }
  allPrints.forEach(function(listing) {
    var photo = shopPhotoMap[listing.slug];
    var item = document.createElement('div');
    item.className = 'photo-list-item' + (listing.slug === selectedPrintSlug ? ' selected' : '');
    item.dataset.slug = listing.slug;
    var thumb = document.createElement('img'); thumb.className = 'photo-thumb';
    thumb.src = photo ? imgSrc(photo.src) : ''; thumb.onerror = function() { thumb.style.background = '#eee'; };
    var info = document.createElement('div'); info.className = 'photo-list-info';
    var t = document.createElement('div'); t.className = 'photo-list-title'; t.textContent = photo ? (photo.title || listing.slug) : listing.slug;
    var m = document.createElement('div'); m.className = 'photo-list-meta';
    m.textContent = listing.sizes.length + ' size' + (listing.sizes.length !== 1 ? 's' : '') + (listing.visible ? '' : ' \u00b7 hidden');
    info.appendChild(t); info.appendChild(m);
    var badges = document.createElement('div'); badges.className = 'photo-list-badges';
    if (listing.visible) { var b = document.createElement('span'); b.className = 'badge active'; b.textContent = 'Live'; badges.appendChild(b); }
    item.appendChild(thumb); item.appendChild(info); item.appendChild(badges);
    item.addEventListener('click', function() { openShopEdit(listing.slug); });
    shopBrowseList.appendChild(item);
  });
}

function openShopEdit(slug) {
  selectedPrintSlug = slug;
  document.querySelectorAll('#shopBrowseList .photo-list-item').forEach(function(el) {
    el.classList.toggle('selected', el.dataset.slug === slug);
  });
  var listing = allPrints.find(function(l) { return l.slug === slug; });
  if (!listing) return;
  renderShopEditPanel(listing, shopPhotoMap[slug]);
}

function renderShopEditPanel(listing, photo) {
  shopEditInner.innerHTML = '';

  if (photo) {
    var thumbWrap = document.createElement('div'); thumbWrap.className = 'edit-thumb-wrap'; thumbWrap.style.cursor = 'zoom-in';
    var thumb = document.createElement('img'); thumb.src = imgSrc(photo.src);
    thumb.onerror = function() { thumbWrap.style.display = 'none'; };
    thumbWrap.appendChild(thumb);
    thumbWrap.addEventListener('click', function() { openImageLightbox(imgSrc(photo.src), photo.title); });
    shopEditInner.appendChild(thumbWrap);
  }

  var topRow = document.createElement('div');
  topRow.style.cssText = 'display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;';
  var lbl = document.createElement('p'); lbl.className = 'section-label'; lbl.style.marginBottom = '0';
  lbl.textContent = photo ? (photo.title || listing.slug) : listing.slug;

  var visBtn = document.createElement('button');
  visBtn.className = 'action-btn' + (!listing.visible ? ' confirm' : '');
  visBtn.textContent = listing.visible ? 'Live' : 'Hidden';
  visBtn.addEventListener('click', async function() {
    var newVisible = !listing.visible;
    try {
      var res = await fetch('http://localhost:3001/api/prints/' + encodeURIComponent(listing.slug), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ visible: newVisible }),
      });
      var data = await res.json(); if (!res.ok) throw new Error(data.error);
      listing.visible = newVisible;
      visBtn.textContent = newVisible ? 'Live' : 'Hidden';
      visBtn.className = 'action-btn' + (!newVisible ? ' confirm' : '');
      showToast(newVisible ? 'Listing live' : 'Listing hidden', false); renderShopBrowseList();
    } catch(e) { showToast('Error: ' + e.message, true); }
  });

  topRow.appendChild(lbl); topRow.appendChild(visBtn); shopEditInner.appendChild(topRow);

  function makeShopField(labelText, value) {
    var wrap = document.createElement('div'); wrap.className = 'field';
    var l = document.createElement('label'); l.textContent = labelText; wrap.appendChild(l);
    var input = document.createElement('input'); input.type = 'text'; input.value = value || '';
    wrap.appendChild(input); return { wrap: wrap, input: input };
  }

  var fPriceLine = makeShopField('Price listing (e.g. "From $280")', listing.priceLine || '');
  var fMedium = makeShopField('Medium', listing.medium);
  var fPaper = makeShopField('Paper', listing.paper);
  var fFinish = makeShopField('Finish', listing.finish);
  var fNotes = makeShopField('Notes', listing.notes);
  [fPriceLine, fMedium, fPaper, fFinish, fNotes].forEach(function(f) { shopEditInner.appendChild(f.wrap); });

  // copy spec button
  var copyRow = document.createElement('div'); copyRow.style.cssText = 'margin-bottom:20px;';
  var copyBtn = document.createElement('button'); copyBtn.className = 'action-btn';
  copyBtn.textContent = 'Copy order spec to clipboard';
  copyBtn.addEventListener('click', function() {
    var lines = [
      'PRINT ORDER SPEC',
      '----------------',
      'Title: ' + (photo ? (photo.title || listing.slug) : listing.slug),
      'Slug: ' + listing.slug,
      'Medium: ' + (listing.medium || '\u2014'),
      'Paper: ' + (listing.paper || '\u2014'),
      'Finish: ' + (listing.finish || '\u2014'),
      listing.notes ? 'Notes: ' + listing.notes : null,
      '',
      'Sizes:',
    ].filter(Boolean);
    (listing.sizes || []).forEach(function(s) {
      var line = '  ' + s.label + ' \u2014 $' + (s.price / 100).toFixed(0);
      if (s.edition) line += ' (Ed. ' + s.edition + ')';
      if (!s.available) line += ' [SOLD OUT]';
      lines.push(line);
    });
    navigator.clipboard.writeText(lines.join('\n')).then(function() {
      showToast('Spec copied to clipboard', false);
    }).catch(function() { showToast('Copy failed', true); });
  });
  copyRow.appendChild(copyBtn); shopEditInner.appendChild(copyRow);

  var sizesRule = document.createElement('div'); sizesRule.className = 'rule'; shopEditInner.appendChild(sizesRule);
  var sizesHeader = document.createElement('div');
  sizesHeader.style.cssText = 'display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;';
  var sizesLbl = document.createElement('p'); sizesLbl.className = 'section-label'; sizesLbl.style.marginBottom = '0'; sizesLbl.textContent = 'Sizes';
  var addSizeBtn = document.createElement('button'); addSizeBtn.className = 'action-btn'; addSizeBtn.textContent = '+ Add size';
  sizesHeader.appendChild(sizesLbl); sizesHeader.appendChild(addSizeBtn);
  shopEditInner.appendChild(sizesHeader);

  var sizesContainer = document.createElement('div'); sizesContainer.style.marginBottom = '24px';
  shopEditInner.appendChild(sizesContainer);

  var sizes = listing.sizes ? listing.sizes.map(function(s) { return Object.assign({}, s); }) : [];

  function renderSizes() {
    sizesContainer.innerHTML = '';
    if (!sizes.length) {
      var none = document.createElement('p');
      none.style.cssText = 'font-size:12px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;';
      none.textContent = 'No sizes yet'; sizesContainer.appendChild(none); return;
    }
    sizes.forEach(function(size, idx) {
      var row = document.createElement('div');
      row.style.cssText = 'display:grid;grid-template-columns:1fr 100px 80px auto auto;gap:10px;align-items:end;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);';

      function sizeInput(labelText, value) {
        var wrap = document.createElement('div');
        var l = document.createElement('label');
        l.style.cssText = 'display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;';
        l.textContent = labelText; wrap.appendChild(l);
        var inp = document.createElement('input'); inp.type = 'text'; inp.value = value || '';
        inp.style.cssText = 'width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);font-family:Jost,sans-serif;font-weight:300;font-size:14px;color:var(--text);padding:4px 0;outline:none;';
        wrap.appendChild(inp); return { wrap: wrap, inp: inp };
      }

      var fLabel = sizeInput('Size', size.label);
      var fPrice = sizeInput('Price ($)', size.price ? (size.price / 100).toFixed(0) : '');
      var fEdition = sizeInput('Edition', size.edition || '');

      fLabel.inp.addEventListener('input', function() { sizes[idx].label = fLabel.inp.value; });
      fPrice.inp.addEventListener('input', function() { sizes[idx].price = Math.round(parseFloat(fPrice.inp.value) * 100) || 0; });
      fEdition.inp.addEventListener('input', function() {
        var v = parseInt(fEdition.inp.value);
        if (v) sizes[idx].edition = v; else delete sizes[idx].edition;
      });

      var availWrap = document.createElement('div');
      var availLbl = document.createElement('label');
      availLbl.style.cssText = 'display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;';
      availLbl.textContent = 'Avail'; availWrap.appendChild(availLbl);
      var availCheck = document.createElement('label'); availCheck.className = 'check-item'; availCheck.style.marginTop = '6px';
      var availInp = document.createElement('input'); availInp.type = 'checkbox'; availInp.checked = size.available;
      var availBox = document.createElement('span'); availBox.className = 'check-box';
      availCheck.appendChild(availInp); availCheck.appendChild(availBox);
      availInp.addEventListener('change', function() { sizes[idx].available = availInp.checked; });
      availWrap.appendChild(availCheck);

      var removeWrap = document.createElement('div');
      var removeLbl = document.createElement('div'); removeLbl.style.height = '18px'; removeWrap.appendChild(removeLbl);
      var removeBtn = document.createElement('button'); removeBtn.className = 'action-btn danger';
      removeBtn.style.marginTop = '6px'; removeBtn.textContent = '\u00d7';
      removeBtn.addEventListener('click', function() { sizes.splice(idx, 1); renderSizes(); });
      removeWrap.appendChild(removeBtn);

      row.appendChild(fLabel.wrap); row.appendChild(fPrice.wrap); row.appendChild(fEdition.wrap);
      row.appendChild(availWrap); row.appendChild(removeWrap);
      sizesContainer.appendChild(row);
    });
  }

  renderSizes();
  addSizeBtn.addEventListener('click', function() { sizes.push({ label: '', price: 0, available: true }); renderSizes(); });

  var saveRow = document.createElement('div'); saveRow.className = 'submit-row';
  var saveBtn = document.createElement('button'); saveBtn.className = 'submit-btn';
  saveBtn.innerHTML = '<span class="line"></span><span>Save listing</span>';
  saveBtn.addEventListener('click', async function() {
    saveBtn.disabled = true; saveBtn.querySelector('span:last-child').textContent = 'Saving...';
    try {
      var res = await fetch('http://localhost:3001/api/prints/' + encodeURIComponent(listing.slug), {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          slug: listing.slug, visible: listing.visible,
          priceLine: fPriceLine.input.value, medium: fMedium.input.value,
          paper: fPaper.input.value, finish: fFinish.input.value,
          notes: fNotes.input.value, sizes: sizes,
        }),
      });
      var data = await res.json(); if (!res.ok) throw new Error(data.error);
      listing.priceLine = fPriceLine.input.value; listing.medium = fMedium.input.value;
      listing.paper = fPaper.input.value; listing.finish = fFinish.input.value;
      listing.notes = fNotes.input.value; listing.sizes = sizes;
      showToast('Listing saved', false); renderShopBrowseList();
    } catch(e) { showToast('Error: ' + e.message, true); }
    saveBtn.disabled = false; saveBtn.querySelector('span:last-child').textContent = 'Save listing';
  });
  saveRow.appendChild(saveBtn); shopEditInner.appendChild(saveRow);
}

// ── Shop order view ───────────────────────────────────────────────────────────
function renderShopOrderList() {
  var orderList = document.getElementById('shopOrderList');
  orderList.innerHTML = '';
  if (!allPrints.length) {
    var empty = document.createElement('div');
    empty.style.cssText = 'padding:24px 20px;font-size:12px;color:#ccc;letter-spacing:.1em;text-transform:uppercase;';
    empty.textContent = 'No prints yet'; orderList.appendChild(empty); return;
  }
  allPrints.forEach(function(listing, idx) {
    var photo = shopPhotoMap[listing.slug];
    var item = document.createElement('div');
    item.className = 'order-item'; item.draggable = true; item.dataset.slug = listing.slug;
    var num = document.createElement('span'); num.className = 'order-num'; num.textContent = idx + 1;
    var thumb = document.createElement('img'); thumb.className = 'order-thumb';
    thumb.src = photo ? imgSrc(photo.src) : ''; thumb.onerror = function() { thumb.style.background = '#eee'; };
    var info = document.createElement('div'); info.className = 'order-info';
    var t = document.createElement('div'); t.className = 'order-title'; t.textContent = photo ? (photo.title || listing.slug) : listing.slug;
    var m = document.createElement('div'); m.className = 'order-meta'; m.textContent = listing.visible ? 'Live' : 'Hidden';
    info.appendChild(t); info.appendChild(m);
    var handle = document.createElement('span'); handle.className = 'drag-handle'; handle.textContent = '\u2837';
    item.appendChild(num); item.appendChild(thumb); item.appendChild(info); item.appendChild(handle);
    item.addEventListener('dragstart', function(e) { shopDragSrc = item; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    item.addEventListener('dragend', function() { item.classList.remove('dragging'); orderList.querySelectorAll('.order-item').forEach(function(el) { el.classList.remove('drag-over'); }); });
    item.addEventListener('dragover', function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; orderList.querySelectorAll('.order-item').forEach(function(el) { el.classList.remove('drag-over'); }); if (item !== shopDragSrc) item.classList.add('drag-over'); });
    item.addEventListener('drop', function(e) {
      e.preventDefault(); if (!shopDragSrc || shopDragSrc === item) return;
      var fi = allPrints.findIndex(function(p) { return p.slug === shopDragSrc.dataset.slug; });
      var ti = allPrints.findIndex(function(p) { return p.slug === item.dataset.slug; });
      var moved = allPrints.splice(fi, 1)[0]; allPrints.splice(ti, 0, moved); renderShopOrderList();
    });
    orderList.appendChild(item);
  });
}

document.getElementById('saveShopOrderBtn').addEventListener('click', async function() {
  var btn = document.getElementById('saveShopOrderBtn');
  btn.disabled = true; btn.querySelector('span:last-child').textContent = 'Saving...';
  try {
    var res = await fetch('http://localhost:3001/api/prints/reorder', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ order: allPrints.map(function(p) { return p.slug; }) }),
    });
    var data = await res.json(); if (!res.ok) throw new Error(data.error);
    showToast('Shop order saved', false); renderShopBrowseList();
  } catch(e) { showToast('Error: ' + e.message, true); }
  btn.disabled = false; btn.querySelector('span:last-child').textContent = 'Save order';
});

</script>
