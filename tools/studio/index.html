<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brad Reardon · Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #999999;
      --dim: #cccccc;
      --border: #e5e5e5;
      --card: #f5f5f5;
      --accent: #1a1a1a;
    }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .wordmark {
      font-family: 'Libre Baskerville', serif;
      font-size: 17px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-tag {
      font-size: 12px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1px 380px;
      flex: 1;
      overflow: hidden;
    }

    .divider { background: var(--border); }

    .drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--card);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
      overflow: hidden;
    }

    .drop-zone.dragover { background: #efefef; }
    .drop-zone.has-image { background: #fff; }

    .drop-zone img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .drop-label {
      font-size: 12px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      line-height: 2;
      pointer-events: none;
      position: relative;
      z-index: 1;
    }

    .drop-label strong {
      display: block;
      font-family: 'Libre Baskerville', serif;
      font-size: 20px;
      font-weight: normal;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text);
      margin-bottom: 6px;
    }

    .drop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    .has-image .drop-overlay { opacity: 1; pointer-events: auto; }

    .change-btn {
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--text);
      padding: 14px 28px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .change-btn:hover { border-color: var(--text); color: var(--text); }

    .form-panel {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 28px 28px 24px;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input,
    .field select {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 15px;
      color: var(--text);
      padding: 6px 0;
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
    }

    .field input:focus,
    .field select:focus { border-color: var(--text); }

    .field input::placeholder { color: var(--dim); }

    .field select option { background: #fff; color: var(--text); }

    .checks {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .check-item input[type="checkbox"] { display: none; }

    .check-box {
      width: 14px;
      height: 14px;
      border: 1px solid var(--border);
      transition: all 0.15s;
      flex-shrink: 0;
      position: relative;
    }

    .check-item input:checked + .check-box {
      background: var(--text);
      border-color: var(--text);
    }

    .check-item input:checked + .check-box::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 5px;
      height: 8px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .check-label {
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .rule { height: 1px; background: var(--border); margin: 4px 0 20px; }

    .submit-row {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .submit-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0;
      transition: color 0.2s;
    }

    .submit-btn:hover { color: var(--text); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .submit-btn .line {
      display: block;
      height: 1px;
      width: 32px;
      background: currentColor;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--text);
      color: #fff;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding: 10px 20px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #c0392b; }

    .slug-preview {
      font-size: 12px;
      color: var(--dim);
      margin-top: 4px;
      letter-spacing: .04em;
    }
  </style>
</head>
<body>

<header>
  <span class="wordmark">Brad Reardon</span>
  <span class="header-tag">Studio — Add Photo</span>
</header>

<div class="layout">

  <div class="drop-zone" id="dropZone">
    <div class="drop-label">
      <strong>Drop image here</strong>
      or click to browse
    </div>
    <div class="drop-overlay">
      <button class="change-btn" id="changeBtn">Change image</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="form-panel">
    <p class="section-label">Photo metadata</p>

    <div class="field">
      <label>Series</label>
      <select id="series" name="series">
        <option value="">Loading...</option>
      </select>
    </div>

    <div class="field">
      <label>Title</label>
      <input type="text" id="title" placeholder="Broadway Facade" />
    </div>

    <div class="field">
      <label>Slug (auto-generated)</label>
      <input type="text" id="slug" placeholder="broadway-facade-2024" />
      <p class="slug-preview" id="slugPreview"></p>
    </div>

    <div class="field">
      <label>Alt text</label>
      <input type="text" id="alt" placeholder="Black and white photo of Broadway facade" />
    </div>

    <div class="field">
      <label>Aspect ratio</label>
      <input type="text" id="aspectRatio" placeholder="2/3" />
    </div>

    <div class="field">
      <label>Year</label>
      <input type="number" id="year" placeholder="2024" value="2024" />
    </div>

    <div class="rule"></div>

    <div class="checks">
      <label class="check-item">
        <input type="checkbox" id="cover" />
        <span class="check-box"></span>
        <span class="check-label">Cover</span>
      </label>
      <label class="check-item">
        <input type="checkbox" id="featured" />
        <span class="check-box"></span>
        <span class="check-label">Featured</span>
      </label>
    </div>

    <div class="submit-row">
      <button class="submit-btn" id="submitBtn" disabled>
        <span class="line"></span>
        Add photo
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none" />

<script>
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var changeBtn = document.getElementById('changeBtn');
var submitBtn = document.getElementById('submitBtn');
var toast = document.getElementById('toast');
var titleEl = document.getElementById('title');
var slugEl = document.getElementById('slug');
var slugPreview = document.getElementById('slugPreview');
var altEl = document.getElementById('alt');
var aspectEl = document.getElementById('aspectRatio');
var yearEl = document.getElementById('year');
var seriesEl = document.getElementById('series');
var coverEl = document.getElementById('cover');
var featuredEl = document.getElementById('featured');

var uploadedFile = null;

fetch('http://localhost:3001/api/series')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    seriesEl.innerHTML = data.series.map(function(s) {
      return '<option value="' + s + '">' + s + '</option>';
    }).join('');
  });

function toSlug(str) {
  var year = yearEl.value || new Date().getFullYear();
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '-' + year;
}

titleEl.addEventListener('input', function() {
  if (titleEl.value) {
    var slug = toSlug(titleEl.value);
    slugEl.value = slug;
    slugPreview.textContent = slug;
  }
});

yearEl.addEventListener('input', function() {
  if (titleEl.value) {
    var slug = toSlug(titleEl.value);
    slugEl.value = slug;
    slugPreview.textContent = slug;
  }
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  uploadedFile = file;

  var old = dropZone.querySelector('img');
  if (old) old.remove();

  var img = document.createElement('img');
  img.src = URL.createObjectURL(file);
  dropZone.appendChild(img);
  dropZone.classList.add('has-image');

  var sizer = new Image();
  sizer.onload = function() {
    var w = sizer.naturalWidth;
    var h = sizer.naturalHeight;
    var ratio = w / h;
    if (Math.abs(ratio - 2/3) < 0.05) aspectEl.value = '2/3';
    else if (Math.abs(ratio - 3/4) < 0.05) aspectEl.value = '3/4';
    else if (Math.abs(ratio - 1) < 0.05) aspectEl.value = '1';
    else if (Math.abs(ratio - 3/2) < 0.05) aspectEl.value = '3/2';
    else if (Math.abs(ratio - 4/3) < 0.05) aspectEl.value = '4/3';
    else aspectEl.value = w + '/' + h;
  };
  sizer.src = URL.createObjectURL(file);

  checkReady();
}

dropZone.addEventListener('click', function() {
  if (!dropZone.classList.contains('has-image')) fileInput.click();
});

changeBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  fileInput.click();
});

fileInput.addEventListener('change', function() {
  handleFile(fileInput.files[0]);
});

dropZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', function() {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

function checkReady() {
  submitBtn.disabled = !(uploadedFile && titleEl.value && slugEl.value && seriesEl.value);
}

[titleEl, slugEl, seriesEl, altEl].forEach(function(el) {
  el.addEventListener('input', checkReady);
});

submitBtn.addEventListener('click', async function() {
  submitBtn.disabled = true;
  submitBtn.querySelector('span:last-child').textContent = 'Uploading...';

  try {
    var formData = new FormData();
    formData.append('image', uploadedFile);
    formData.append('series', seriesEl.value);

    var uploadRes = await fetch('http://localhost:3001/api/upload', { method: 'POST', body: formData });
    var uploadData = await uploadRes.json();

    var photoRes = await fetch('http://localhost:3001/api/photos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        slug: slugEl.value,
        src: uploadData.src,
        alt: altEl.value || titleEl.value,
        title: titleEl.value,
        series: seriesEl.value,
        aspectRatio: aspectEl.value || '2/3',
        year: parseInt(yearEl.value) || new Date().getFullYear(),
        cover: coverEl.checked,
        featured: featuredEl.checked,
      }),
    });

    if (!photoRes.ok) throw new Error('Failed to write photo');

    showToast('Photo added — refresh localhost:3000', false);
    resetForm();
  } catch(e) {
    showToast('Error: ' + e.message, true);
    submitBtn.disabled = false;
    submitBtn.querySelector('span:last-child').textContent = 'Add photo';
  }
});

function resetForm() {
  uploadedFile = null;
  var img = dropZone.querySelector('img');
  if (img) img.remove();
  dropZone.classList.remove('has-image');
  titleEl.value = '';
  slugEl.value = '';
  slugPreview.textContent = '';
  altEl.value = '';
  aspectEl.value = '';
  yearEl.value = new Date().getFullYear();
  coverEl.checked = false;
  featuredEl.checked = false;
  submitBtn.querySelector('span:last-child').textContent = 'Add photo';
  checkReady();
}

function showToast(msg, isError) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(function() { toast.className = 'toast'; }, 3200);
}
</script>
</body>
</html>
