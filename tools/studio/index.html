<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brad Reardon · Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@0;1&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #999999;
      --dim: #cccccc;
      --border: #e5e5e5;
      --card: #f5f5f5;
    }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .wordmark {
      font-family: 'Libre Baskerville', serif;
      font-size: 17px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-tag {
      font-size: 12px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      padding: 0 32px;
      background: var(--bg);
    }

    .tab {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 0;
      margin-right: 32px;
      border-bottom: 1px solid transparent;
      border-top: none;
      border-left: none;
      border-right: none;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    .page { display: none; flex: 1; overflow: hidden; }
    .page.active { display: flex; }

    /* ADD PHOTO */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1px 380px;
      flex: 1;
      overflow: hidden;
      width: 100%;
    }

    .divider { background: var(--border); }

    .drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--card);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
      overflow: hidden;
    }

    .drop-zone.dragover { background: #efefef; }
    .drop-zone.has-image { background: #fff; }

    .drop-zone img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .drop-label {
      font-size: 12px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      line-height: 2;
      pointer-events: none;
      position: relative;
      z-index: 1;
    }

    .drop-label strong {
      display: block;
      font-family: 'Libre Baskerville', serif;
      font-size: 20px;
      font-weight: normal;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text);
      margin-bottom: 6px;
    }

    .drop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    .has-image .drop-overlay { opacity: 1; pointer-events: auto; }

    .change-btn {
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--text);
      padding: 14px 28px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .form-panel {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 28px 28px 24px;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input,
    .field select {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 15px;
      color: var(--text);
      padding: 6px 0;
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
    }

    .field input:focus,
    .field select:focus { border-color: var(--text); }
    .field input::placeholder { color: var(--dim); }
    .field select option { background: #fff; color: var(--text); }

    .checks {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .check-item input[type="checkbox"] { display: none; }

    .check-box {
      width: 14px;
      height: 14px;
      border: 1px solid var(--border);
      transition: all 0.15s;
      flex-shrink: 0;
      position: relative;
    }

    .check-item input:checked + .check-box {
      background: var(--text);
      border-color: var(--text);
    }

    .check-item input:checked + .check-box::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 5px;
      height: 8px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .check-label {
      font-size: 12px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .rule { height: 1px; background: var(--border); margin: 4px 0 20px; }

    .submit-row {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .submit-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0;
      transition: color 0.2s;
    }

    .submit-btn:hover { color: var(--text); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .submit-btn .line {
      display: block;
      height: 1px;
      width: 32px;
      background: currentColor;
    }

    .slug-preview {
      font-size: 12px;
      color: var(--dim);
      margin-top: 4px;
      letter-spacing: .04em;
    }

    /* SERIES PAGE */
    .scroll-page {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      max-width: 600px;
    }

    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .list-row:first-child { border-top: 1px solid var(--border); }

    .row-name {
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      flex: 1;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track { background: var(--text); }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

    .add-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 32px;
    }

    .add-input {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 15px;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      outline: none;
      padding: 6px 0;
      width: 240px;
      transition: border-color 0.15s;
    }

    .add-input:focus { border-bottom-color: var(--text); }
    .add-input::placeholder { color: var(--dim); }

    /* PHOTOS PAGE */
    .photos-page {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .photos-filter {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      margin-bottom: -1px;
      padding: 10px 16px 10px 0;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .filter-btn.active { color: var(--text); border-bottom-color: var(--text); }
    .filter-btn:hover { color: var(--text); }

    .photo-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .photo-row:first-child { border-top: 1px solid var(--border); }

    .photo-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      background: var(--card);
      flex-shrink: 0;
      display: block;
    }

    .photo-info {
      flex: 1;
      min-width: 0;
    }

    .photo-title {
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .photo-sub {
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--muted);
      margin-top: 2px;
    }

    .photo-toggles {
      display: flex;
      gap: 24px;
      align-items: center;
      flex-shrink: 0;
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .toggle-label span {
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--text);
      color: #fff;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding: 10px 20px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #c0392b; }
  </style>
</head>
<body>

<header>
  <span class="wordmark">Brad Reardon</span>
  <span class="header-tag">Studio</span>
</header>

<div class="tabs">
  <button class="tab active" data-tab="add-photo">Add Photo</button>
  <button class="tab" data-tab="series">Series</button>
  <button class="tab" data-tab="photos">Photos</button>
</div>

<!-- ADD PHOTO -->
<div class="page active" id="page-add-photo">
  <div class="layout">
    <div class="drop-zone" id="dropZone">
      <div class="drop-label">
        <strong>Drop image here</strong>
        or click to browse
      </div>
      <div class="drop-overlay">
        <button class="change-btn" id="changeBtn">Change image</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="form-panel">
      <p class="section-label">Photo metadata</p>
      <div class="field">
        <label>Series</label>
        <select id="series" name="series"><option value="">Loading...</option></select>
      </div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="title" placeholder="Broadway Facade" />
      </div>
      <div class="field">
        <label>Slug (auto-generated)</label>
        <input type="text" id="slug" placeholder="broadway-facade-2024" />
        <p class="slug-preview" id="slugPreview"></p>
      </div>
      <div class="field">
        <label>Alt text</label>
        <input type="text" id="alt" placeholder="Black and white photo of Broadway facade" />
      </div>
      <div class="field">
        <label>Aspect ratio</label>
        <input type="text" id="aspectRatio" placeholder="2/3" />
      </div>
      <div class="field">
        <label>Year</label>
        <input type="number" id="year" placeholder="2024" value="2024" />
      </div>
      <div class="rule"></div>
      <div class="checks">
        <label class="check-item">
          <input type="checkbox" id="cover" />
          <span class="check-box"></span>
          <span class="check-label">Cover</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="featured" />
          <span class="check-box"></span>
          <span class="check-label">Featured</span>
        </label>
      </div>
      <div class="submit-row">
        <button class="submit-btn" id="submitBtn" disabled>
          <span class="line"></span>
          Add photo
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SERIES -->
<div class="page" id="page-series">
  <div class="scroll-page">
    <p class="section-label" style="margin-bottom:24px;">Series visibility</p>
    <div id="seriesList"></div>
    <div class="add-row">
      <input class="add-input" id="newSeriesInput" type="text" placeholder="New series name" />
      <button class="submit-btn" id="addSeriesBtn">
        <span class="line"></span>
        Add series
      </button>
    </div>
  </div>
</div>

<!-- PHOTOS -->
<div class="page" id="page-photos">
  <div class="photos-page">
    <div class="photos-filter" id="photosFilter"></div>
    <div id="photosList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none" />

<script>
// TABS
var tabs = document.querySelectorAll('.tab');
var pages = document.querySelectorAll('.page');

tabs.forEach(function(tab) {
  tab.addEventListener('click', function() {
    tabs.forEach(function(t) { t.classList.remove('active'); });
    pages.forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'series') loadSeriesPage();
    if (tab.dataset.tab === 'photos') loadPhotosPage();
  });
});

// SHARED
var toast = document.getElementById('toast');

function showToast(msg, isError) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(function() { toast.className = 'toast'; }, 3200);
}

function loadSeriesDropdown() {
  return fetch('http://localhost:3001/api/series')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var el = document.getElementById('series');
      el.innerHTML = data.series.map(function(s) {
        return '<option value="' + s + '">' + s + '</option>';
      }).join('');
      return data;
    });
}

loadSeriesDropdown();

// ADD PHOTO
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var changeBtn = document.getElementById('changeBtn');
var submitBtn = document.getElementById('submitBtn');
var titleEl = document.getElementById('title');
var slugEl = document.getElementById('slug');
var slugPreview = document.getElementById('slugPreview');
var altEl = document.getElementById('alt');
var aspectEl = document.getElementById('aspectRatio');
var yearEl = document.getElementById('year');
var seriesEl = document.getElementById('series');
var coverEl = document.getElementById('cover');
var featuredEl = document.getElementById('featured');
var uploadedFile = null;

function toSlug(str) {
  var year = yearEl.value || new Date().getFullYear();
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '-' + year;
}

titleEl.addEventListener('input', function() {
  if (titleEl.value) { var s = toSlug(titleEl.value); slugEl.value = s; slugPreview.textContent = s; }
});
yearEl.addEventListener('input', function() {
  if (titleEl.value) { var s = toSlug(titleEl.value); slugEl.value = s; slugPreview.textContent = s; }
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  uploadedFile = file;
  var old = dropZone.querySelector('img');
  if (old) old.remove();
  var img = document.createElement('img');
  img.src = URL.createObjectURL(file);
  dropZone.appendChild(img);
  dropZone.classList.add('has-image');
  var sizer = new Image();
  sizer.onload = function() {
    var w = sizer.naturalWidth, h = sizer.naturalHeight, r = w / h;
    if (Math.abs(r - 2/3) < 0.05) aspectEl.value = '2/3';
    else if (Math.abs(r - 3/4) < 0.05) aspectEl.value = '3/4';
    else if (Math.abs(r - 1) < 0.05) aspectEl.value = '1';
    else if (Math.abs(r - 3/2) < 0.05) aspectEl.value = '3/2';
    else if (Math.abs(r - 4/3) < 0.05) aspectEl.value = '4/3';
    else aspectEl.value = w + '/' + h;
  };
  sizer.src = URL.createObjectURL(file);
  checkReady();
}

dropZone.addEventListener('click', function() { if (!dropZone.classList.contains('has-image')) fileInput.click(); });
changeBtn.addEventListener('click', function(e) { e.stopPropagation(); fileInput.click(); });
fileInput.addEventListener('change', function() { handleFile(fileInput.files[0]); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

function checkReady() {
  submitBtn.disabled = !(uploadedFile && titleEl.value && slugEl.value && seriesEl.value);
}
[titleEl, slugEl, seriesEl, altEl].forEach(function(el) { el.addEventListener('input', checkReady); });

submitBtn.addEventListener('click', async function() {
  submitBtn.disabled = true;
  submitBtn.querySelector('span:last-child').textContent = 'Uploading...';
  try {
    var fd = new FormData();
    fd.append('image', uploadedFile);
    fd.append('series', seriesEl.value);
    var ur = await fetch('http://localhost:3001/api/upload', { method: 'POST', body: fd });
    var ud = await ur.json();
    var pr = await fetch('http://localhost:3001/api/photos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        slug: slugEl.value, src: ud.src, alt: altEl.value || titleEl.value,
        title: titleEl.value, series: seriesEl.value, aspectRatio: aspectEl.value || '2/3',
        year: parseInt(yearEl.value) || new Date().getFullYear(),
        cover: coverEl.checked, featured: featuredEl.checked,
      }),
    });
    if (!pr.ok) throw new Error('Failed to write photo');
    showToast('Photo added', false);
    loadSeriesDropdown();
    resetForm();
  } catch(e) {
    showToast('Error: ' + e.message, true);
    submitBtn.disabled = false;
    submitBtn.querySelector('span:last-child').textContent = 'Add photo';
  }
});

function resetForm() {
  uploadedFile = null;
  var img = dropZone.querySelector('img');
  if (img) img.remove();
  dropZone.classList.remove('has-image');
  titleEl.value = ''; slugEl.value = ''; slugPreview.textContent = '';
  altEl.value = ''; aspectEl.value = '';
  yearEl.value = new Date().getFullYear();
  coverEl.checked = false; featuredEl.checked = false;
  submitBtn.querySelector('span:last-child').textContent = 'Add photo';
  checkReady();
}

// SERIES PAGE
var seriesListEl = document.getElementById('seriesList');
var newSeriesInput = document.getElementById('newSeriesInput');
var addSeriesBtn = document.getElementById('addSeriesBtn');

function loadSeriesPage() {
  fetch('http://localhost:3001/api/series')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      seriesListEl.innerHTML = '';
      var config = data.config || {};
      data.series.forEach(function(name) {
        var visible = config[name] ? config[name].visible : true;
        seriesListEl.appendChild(makeSeriesRow(name, visible));
      });
    });
}

function makeSeriesRow(name, visible) {
  var row = document.createElement('div');
  row.className = 'list-row';

  var nameEl = document.createElement('span');
  nameEl.className = 'row-name';
  nameEl.textContent = name;

  var toggle = document.createElement('label');
  toggle.className = 'toggle';

  var input = document.createElement('input');
  input.type = 'checkbox';
  input.checked = visible;

  var track = document.createElement('span');
  track.className = 'toggle-track';

  var thumb = document.createElement('span');
  thumb.className = 'toggle-thumb';

  input.addEventListener('change', async function() {
    try {
      var res = await fetch('http://localhost:3001/api/series/visibility', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, visible: input.checked }),
      });
      if (!res.ok) throw new Error('Failed');
      showToast(name + (input.checked ? ' visible' : ' hidden'), false);
    } catch(e) {
      input.checked = !input.checked;
      showToast('Error: ' + e.message, true);
    }
  });

  toggle.appendChild(input);
  toggle.appendChild(track);
  toggle.appendChild(thumb);
  row.appendChild(nameEl);
  row.appendChild(toggle);
  return row;
}

addSeriesBtn.addEventListener('click', async function() {
  var name = newSeriesInput.value.trim();
  if (!name) return;
  try {
    var res = await fetch('http://localhost:3001/api/series/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name }),
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);
    newSeriesInput.value = '';
    showToast(name + ' added', false);
    loadSeriesPage();
    loadSeriesDropdown();
  } catch(e) { showToast('Error: ' + e.message, true); }
});

newSeriesInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addSeriesBtn.click(); });

// PHOTOS PAGE
var photosListEl = document.getElementById('photosList');
var photosFilterEl = document.getElementById('photosFilter');
var photosActiveFilter = 'All';
var photosData = [];

function loadPhotosPage() {
  Promise.all([
    fetch('http://localhost:3001/api/photos').then(function(r) { return r.json(); }),
    fetch('http://localhost:3001/api/series').then(function(r) { return r.json(); }),
  ]).then(function(results) {
    photosData = results[0].photos || [];
    var seriesNames = results[1].series || [];
    renderPhotosFilter(['All'].concat(seriesNames));
    renderPhotosList();
  });
}

function renderPhotosFilter(series) {
  photosFilterEl.innerHTML = '';
  series.forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (s === photosActiveFilter ? ' active' : '');
    btn.textContent = s;
    btn.addEventListener('click', function() {
      photosActiveFilter = s;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderPhotosList();
    });
    photosFilterEl.appendChild(btn);
  });
}

function renderPhotosList() {
  var filtered = photosActiveFilter === 'All'
    ? photosData
    : photosData.filter(function(p) { return p.series === photosActiveFilter; });

  photosListEl.innerHTML = '';

  if (filtered.length === 0) {
    photosListEl.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:20px 0;">No photos yet.</p>';
    return;
  }

  filtered.forEach(function(photo) {
    var row = document.createElement('div');
    row.className = 'photo-row';

    var thumb = document.createElement('img');
    thumb.className = 'photo-thumb';
    thumb.src = 'http://localhost:3000' + photo.src;
    thumb.onerror = function() { this.style.background = 'var(--card)'; };

    var info = document.createElement('div');
    info.className = 'photo-info';

    var titleDiv = document.createElement('div');
    titleDiv.className = 'photo-title';
    titleDiv.textContent = photo.title;

    var sub = document.createElement('div');
    sub.className = 'photo-sub';
    sub.textContent = photo.series + ' · ' + photo.year;

    info.appendChild(titleDiv);
    info.appendChild(sub);

    var toggles = document.createElement('div');
    toggles.className = 'photo-toggles';

    ['cover', 'featured'].forEach(function(field) {
      var wrap = document.createElement('div');
      wrap.className = 'toggle-label';

      var lbl = document.createElement('span');
      lbl.textContent = field;

      var tog = document.createElement('label');
      tog.className = 'toggle';

      var inp = document.createElement('input');
      inp.type = 'checkbox';
      inp.checked = !!photo[field];

      var track = document.createElement('span');
      track.className = 'toggle-track';

      var tthumb = document.createElement('span');
      tthumb.className = 'toggle-thumb';

      inp.addEventListener('change', async function() {
        try {
          var res = await fetch('http://localhost:3001/api/photos/' + photo.slug, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ field: field, value: inp.checked }),
          });
          if (!res.ok) throw new Error('Failed');
          photo[field] = inp.checked;
          showToast(photo.title + ' updated', false);
        } catch(e) {
          inp.checked = !inp.checked;
          showToast('Error: ' + e.message, true);
        }
      });

      tog.appendChild(inp);
      tog.appendChild(track);
      tog.appendChild(tthumb);
      wrap.appendChild(lbl);
      wrap.appendChild(tog);
      toggles.appendChild(wrap);
    });

    row.appendChild(thumb);
    row.appendChild(info);
    row.appendChild(toggles);
    photosListEl.appendChild(row);
  });
}
</script>
</body>
</html>
